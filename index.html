<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Britts</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      /* BACKGROUND IMAGE */
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url('./AdamLaboratory.jpeg');

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      padding: 60px 20px;
      backdrop-filter: blur(2px);
    }

    .profile {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid white;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(255,255,255,0.25);
    }

    h1 {
      font-size: 80px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    h2 {
      font-size: 34px;
      color: #d0d0d0;
      font-weight: normal;
      margin-top: 0;
    }

    p {
      font-size: 24px;
      max-width: 950px;
      margin: 40px auto;
      line-height: 1.7;
      background: rgba(0,0,0,0.45);
      padding: 25px;
      border-radius: 15px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 70px;
      padding-bottom: 50px;
    }

    .gallery img {
      width: 280px;
      height: 380px;
      object-fit: cover;
      border-radius: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .gallery img:hover {
      transform: scale(1.04);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- PROFILE PHOTO -->
    <img src="./AdamBILD5.jpeg" class="profile">

    <h1>Adam Britts</h1>

    <h2>Chemical Engineer</h2>

    <p>
      Chemical engineer interested in process engineering,
      optimization, industrial systems, and technical problem solving.
    </p>

    <!-- GALLERY -->
    <div class="gallery">
      <img src="./AdamBILD3.jpeg">
      <img src="./AdamBond3.png">
      <img src="./AdamBond4.png">
      <img src="./AdamBond5.png">
    </div>

  </div>

</body>
</html>
