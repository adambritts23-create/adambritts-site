<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Britts</title>

  <style>

    body {
      margin: 0;
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    .profile {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid white;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 10px;
    }

    h2 {
      color: #aaaaaa;
      font-weight: normal;
      font-size: 32px;
      margin-bottom: 40px;
    }

    p {
      max-width: 900px;
      margin: auto;
      font-size: 24px;
      line-height: 1.7;
      color: #dddddd;
    }

    .gallery {
      margin-top: 70px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .gallery img {
      width: 320px;
      border-radius: 14px;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="AdamBILD3.jpeg" class="profile">

    <h1>Adam Britts</h1>

    <h2>Chemical Engineer</h2>

    <p>
      Chemical engineer interested in process engineering,
      optimization, industrial systems, and technical problem solving.
    </p>

    <div class="gallery">

      <img src="AdamBILD5.jpeg">

      <img src="HamburgAdam.jpg">

      <img src="AdamBond4.png">

      <img src="AdamBond5.png">

    </div>

  </div>

</body>

</html>
