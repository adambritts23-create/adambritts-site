<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Britts</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.88)),
        url("./AdamBil.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      min-height: 100vh;
      padding: 60px 20px;
    }

    .profile {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid white;
      margin-bottom: 30px;
      box-shadow: 0 0 35px rgba(0,0,0,0.8);
    }

    h1 {
      font-size: 76px;
      margin: 10px 0;
    }

    h2 {
      font-size: 34px;
      color: #d0d0d0;
      font-weight: normal;
      margin-top: 0;
    }

    p {
      max-width: 900px;
      margin: 40px auto;
      font-size: 24px;
      line-height: 1.7;
      background: rgba(0,0,0,0.45);
      padding: 24px;
      border-radius: 16px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 22px;
      margin-top: 70px;
      padding-bottom: 60px;
    }

    .gallery img {
      width: 280px;
      height: 380px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="./AdamBILD5.jpeg" class="profile">

    <h1>Adam Britts</h1>

    <h2>Chemical Engineer</h2>

    <p>
      Chemical engineer interested in process engineering,
      optimization, industrial systems, and technical problem solving.
    </p>

    <div class="gallery">
      <img src="./AdamBILD3.jpeg">
      <img src="./AdamBond4.png">
      <img src="./AdamBond5.png">
      <img src="./AdamLaboratory.jpeg">
    </div>

  </div>
</body>
</html>
