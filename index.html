<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam Britts</title>

  <style>
    body {
      margin: 0;
      background-color: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    .profile {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 32px;
      color: #999;
      font-weight: normal;
      margin-top: 0;
    }

    p {
      font-size: 22px;
      max-width: 900px;
      margin: 40px auto;
      line-height: 1.6;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    .gallery img {
      width: 300px;
      height: 400px;
      object-fit: cover;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="./AdamBILD5.jpeg" class="profile">

    <h1>Adam Britts</h1>

    <h2>Chemical Engineer</h2>

    <p>
      Chemical engineer interested in process engineering,
      optimization, industrial systems, and technical problem solving.
    </p>

    <div class="gallery">
      <img src="./AdamBILD5.jpeg">
      <img src="./HamburgAdam.jpg">
      <img src="./AdamBond4.png">
      <img src="./AdamBond5.png">
    </div>

  </div>

</body>
</html>
